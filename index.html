<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redberry Bootcamp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body style="background-color: var(--color-grey-100)">
  <!-- ===== NAVBAR ===== -->
  <header class="navbar" style="background-color: var(--color-grey-100)">
    <div class="navbar__inner">

      <!-- Logo -->
      <a href="index.html" class="navbar__logo">
        <img src="assets/Logo.svg" alt="Redberry" />
      </a>

      <!-- Right side — JS fills this -->
      <div class="navbar__right" id="navbar-right"></div>

    </div>
  </header>

  <!-- PAGE  -->
  <main class="page-wrapper">
  <div class="container">

    <section class="hero">
      <div class="hero__content">
        <h1 class="hero__title">Start learning something new today</h1>
        <p class="hero__subtitle">
          Explore a wide range of expert-led courses in design, development,
          business, and more. Find the skills you need to grow your career
          and learn at your own pace.
        </p>
        <a href="catalog.html" class="hero__btn">Browse Courses</a>
      </div>

      <div class="hero__carousel-nav">
        <div class="hero__dots">
          <span class="hero__dot hero__dot--active"></span>
          <span class="hero__dot"></span>
          <span class="hero__dot"></span>
        </div>
        <div class="hero__arrows">
          <button class="hero__arrow hero__arrow--left">
            <img src="./assets/arrow-left.svg" alt="arrow left">
          </button>
          <button class="hero__arrow hero__arrow--right">
            <img src="./assets/arrow-right.svg" alt="arrow right">
          </button>
        </div>
      </div>
    </section>

    <div id="dashboard-root"></div>

  </div>
</main>

  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/modal.js"></script>
  <script src="./js/sidebar.js"></script>
  <script src="./js/dashboard.js"></script>

</body>
</html>
